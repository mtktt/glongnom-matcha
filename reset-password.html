<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glongnom POS — Set Password</title>
  <link rel="stylesheet" href="/css/design-system.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: clamp(64px, 12vh, 140px);
    }
    .card {
      background: var(--surface-warm);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
      border: 1.5px solid var(--border);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: var(--text-2xl); font-weight: 700; color: var(--text-primary); }
    .logo p  { font-size: var(--text-sm); color: var(--text-muted); margin-top: 4px; }
    label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: 'Sarabun', system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }
    input:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(255,133,161,0.18);
    }
    button {
      width: 100%;
      padding: 13px;
      background: var(--brown-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Sarabun', system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover    { background: var(--brown-mid); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Brand divider */
    .hero-divider {
      width: 40px; height: 2px; background: var(--pink-accent);
      border-radius: 2px; margin: 8px auto 16px;
    }

    /* Password show/hide wrapper */
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap input { margin-bottom: 0; padding-right: 44px; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: var(--text-muted); padding: 0; width: auto;
    }
    .eye-btn:hover { color: var(--brown-mid); }

    /* Footer link row */
    .footer-row { display: flex; justify-content: center; margin-top: 18px; }
    .link-btn {
      background: none; border: none; color: var(--brown-mid); font-size: var(--text-sm);
      font-weight: 600; cursor: pointer; padding: 0; text-decoration: underline;
      font-family: 'Sarabun', system-ui, sans-serif;
    }
    .link-btn:hover { color: var(--brown-dark); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Glongnom POS</h1>
    <div class="hero-divider"></div>
    <p id="pageSubtitle">Set your password</p>
  </div>

  <div class="msg" id="msgBox"></div>

  <form id="resetForm">
    <label for="password">New Password</label>
    <div class="input-wrap">
      <input type="password" id="password" minlength="6" required />
      <button type="button" class="eye-btn" onclick="togglePw('password')" aria-label="Show password">👁</button>
    </div>
    <div class="hint-text">Minimum 6 characters</div>

    <label for="confirm">Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat password" required />
      <button type="button" class="eye-btn" onclick="togglePw('confirm')" aria-label="Show confirm password">👁</button>
    </div>

    <button type="submit" id="submitBtn">Set Password</button>
  </form>
  <div class="footer-row">
    <a href="/login.html" class="link-btn">← Back to login</a>
  </div>
</div>

<script>
  // ── Password show/hide ──
  function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  // Supabase auto-detects the token from the URL hash (#access_token=...&type=invite/recovery)
  // and establishes a session. We just need to call updateUser with the new password.

  function showMsg(text, type) {
    const el = document.getElementById('msgBox');
    el.textContent   = text;
    el.className     = 'msg ' + type + ' show';
  }

  // Check if we have a valid session from the invite/recovery link
  window.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      showMsg('This link has expired or is invalid. Ask your admin to resend the invite.', 'error');
      document.getElementById('submitBtn').disabled = true;
    }
  });

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('submitBtn');

    if (password !== confirm) {
      showMsg('Passwords do not match.', 'error');
      return;
    }
    if (password.length < 6) {
      showMsg('Password must be at least 6 characters.', 'error');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Saving…';

    const { error } = await supabase.auth.updateUser({ password });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled    = false;
      btn.textContent = 'Set Password';
      return;
    }

    showMsg('Password set! Redirecting to login…', 'success');
    document.getElementById('resetForm').style.display = 'none';

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 1800);
  });
</script>
</body>
</html>
